{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Diaspora Assistant{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <header>
        <div class="container">
            <h1 class="site-title">
                <a href="{% url 'create_task' %}">AI Diaspora Assistant</a>
            </h1>
            <nav>
                <a href="{% url 'create_task' %}">New Request</a>
                <a href="{% url 'task_dashboard' %}">Dashboard</a>
            </nav>
        </div>
    </header>
    <main class="container">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="alert">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <small>&copy; 2026 AI Diaspora Assistant</small>
        </div>
    </footer>
</body>
</html>
